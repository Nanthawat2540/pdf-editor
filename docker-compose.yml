services:
  pdf-editor:
    build: .
    container_name: pdf-editor
    restart: always
    ports:
      - "3007:3000"
    networks:
      - proxy-net
    volumes:
      - pdf-uploads:/app/uploads
      - pdf-outputs:/app/output
    environment:
      - PORT=3000
      - NODE_ENV=production

networks:
  proxy-net:
    external: true

volumes:
  pdf-uploads:
  pdf-outputs:
